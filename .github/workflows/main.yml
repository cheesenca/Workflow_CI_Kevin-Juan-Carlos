name: Workflow CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write  

jobs:
  train:
    name: Train Model
    runs-on: ubuntu-latest
    outputs:
      run_id: ${{ steps.save_run_id.outputs.run_id }}

    steps:
      # Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Setup Python
      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # Install Dependencies
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 pandas numpy scikit-learn scipy matplotlib python-dotenv cloudpickle

      # Run MLflow Project
      - name: Fraud Detection
        env:
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_REPO: ${{ secrets.DAGSHUB_REPO }}
        run: |
          mlflow run MLProject/ --env-manager=local \
            -P contamination=0.05 \
            -P random_state=42 \
            -P n_estimators=100 \
            -P dataset=bank_transactions_preprocessing.csv

      # Save and Export Run ID
      - name: Save and Export Run ID
        id: save_run_id
        run: |
          mkdir -p MLProject/models
          cp models/model_run_id.txt MLProject/models/model_run_id.txt
          RUN_ID=$(cat models/model_run_id.txt)
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "Exported Run ID: $RUN_ID"
            
      # Commit Mlruns & Model Artifacts Back to Repo
      - name: Commit Artifacts to Repository
        run: |
          mkdir -p mlruns models MLProject/models
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add mlruns/ models/ MLProject/models/ MLProject/models/isolation_forest/ || true
          git diff --cached --quiet || git commit -m "update mlruns and model artifacts"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: train

    steps:
      # Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Pull Latest Changes from Train Job
      - name: Pull latest changes
        run: git pull origin main

      # Setup Python & MLflow
      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install MLflow
        run: pip install mlflow==2.19.0

      # Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Get Latest Run ID from Saved File
      - name: Get Model Run ID
        id: get_run_id
        run: |
          RUN_ID="${{ needs.train.outputs.run_id }}"
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "Run ID: $RUN_ID"

      # Build Docker Image using mlflow models build-docker
      - name: Build Docker Image via MLflow
        env:
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_REPO: ${{ secrets.DAGSHUB_REPO }}
        run: |
          export MLFLOW_TRACKING_URI="https://dagshub.com/${DAGSHUB_USERNAME}/${DAGSHUB_REPO}.mlflow"
          export MLFLOW_TRACKING_USERNAME="${DAGSHUB_USERNAME}"
          export MLFLOW_TRACKING_PASSWORD="${DAGSHUB_TOKEN}"
 
          mlflow models build-docker \
            --model-uri "runs:/${{ steps.get_run_id.outputs.run_id }}/model" \
            --name "${{ secrets.DOCKERHUB_USERNAME }}/fraud-detection-isolation-forest" \
            --enable-mlserver

      # Push Docker Image to Docker Hub
      - name: Push Docker Image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/fraud-detection-isolation-forest:latest

      # Save Docker Hub Link to File and Commit
      - name: Save Docker Hub Link
        run: |
          echo "https://hub.docker.com/r/${{ secrets.DOCKERHUB_USERNAME }}/fraud-detection-isolation-forest" > MLProject/docker_image_url.txt
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add MLProject/docker_image_url.txt
          git diff --cached --quiet || git commit -m "CI: Update Docker Hub link"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
