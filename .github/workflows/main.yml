name: Workflow CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  MLFLOW_TRACKING_URI: https://dagshub.com/${{ secrets.DAGSHUB_USERNAME }}/${{ secrets.DAGSHUB_REPO }}.mlflow

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Setup Python
      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # Install Dependencies
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 pandas numpy scikit-learn scipy matplotlib python-dotenv cloudpickle

      # Run MLflow Project
      - name: Run MLflow Project
        env:
          MLFLOW_TRACKING_URI: ${{ env.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        working-directory: MLProject
        run: |
          python modeling.py \
            --contamination 0.05 \
            --random_state 42 \
            --n_estimators 100 \
            --dataset bank_transactions_preprocessing.csv

      # Get Latest Run ID
      - name: Get Latest Run ID
        id: get_run_id                                   
        working-directory: MLProject/models
        run: |
          RUN_ID=$(cat model_run_id.txt)
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT    
          echo "Latest Run ID: $RUN_ID"

      # Upload Artifacts to GitHub
      - name: Upload Artifacts to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: fraud-detection-model-${{ steps.get_run_id.outputs.run_id }}
          path: MLProject/models/
          retention-days: 90

      # Commit Artifacts to Repository
      - name: Commit Artifacts to Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add MLProject/models/ mlruns/ || true
          git diff --cached --quiet || git commit -m "update model artifacts and mlruns"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Build Docker Image
      - name: Build Docker Image
        env:
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          mlflow models build-docker \
            --model-uri "runs:/${{ steps.get_run_id.outputs.run_id }}/model" \
            --name "fraud-detection-isolation-forest" \
            --enable-mlserver

      # Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Tag Docker Image
      - name: Tag Docker Image
        run: |
          docker tag fraud-detection-isolation-forest:latest ${{ secrets.DOCKERHUB_USERNAME }}/fraud-detection-isolation-forest:${{ steps.get_run_id.outputs.run_id }}
          docker tag fraud-detection-isolation-forest:latest ${{ secrets.DOCKERHUB_USERNAME }}/fraud-detection-isolation-forest:latest

      # Push Docker Image to Docker Hub
      - name: Push Docker Image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/fraud-detection-isolation-forest:${{ steps.get_run_id.outputs.run_id }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/fraud-detection-isolation-forest:latest

      # Save Docker Hub Link
      - name: Save Docker Hub Link
        run: |
          echo "https://hub.docker.com/r/${{ secrets.DOCKERHUB_USERNAME }}/fraud-detection-isolation-forest" > MLProject/docker_image_url.txt
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add MLProject/docker_image_url.txt
          git diff --cached --quiet || git commit -m "update Docker Hub link"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
